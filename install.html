<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>75 Minton 뮤직 플레이어 설치</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background-color: #121212;
      color: white;
    }
    .container {
      margin-top: 50px;
    }
    .logo {
      width: 150px;
      height: 150px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }
    #installBtn {
      background-color: #D4AF37;
      color: black;
      border: none;
      padding: 15px 30px;
      font-size: 1.2em;
      cursor: pointer;
      border-radius: 5px;
    }
    #installBtn:hover {
      background-color: #F2D06B;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="./icons/icon-512.png" alt="75 Minton 로고" class="logo">
    <h1>75 Minton 토끼 <br> 뮤직 플레이어 설치</h1>
    <p>앱으로 설치하고 언제 어디서나<br> 편리하게 음악을 즐기세요!</p>
    <button id="installBtn" hidden>앱 설치</button>
  </div>

  <script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      // 모바일 브라우저 기본 설치 팝업 방지
      e.preventDefault();
      // 이벤트를 보관해두었다가 사용자가 버튼을 클릭하면 트리거
      deferredPrompt = e;
      // 숨겨뒀던 앱 설치 버튼을 보여줌
      installBtn.hidden = false;
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      
      // 브라우저의 설치 프롬프트 띄우기
      deferredPrompt.prompt();
      
      // 사용자의 응답 대기 (설치 수락 혹은 거절)
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`사용자 설치 응답: ${outcome}`);
      
      // 프롬프트는 한 번만 사용할 수 있으므로 비워줌
      deferredPrompt = null;
      // 버튼 다시 숨김
      installBtn.hidden = true;
    });

    window.addEventListener('appinstalled', () => {
      // 앱이 정상적으로 설치되면 버튼을 숨김
      installBtn.hidden = true;
      deferredPrompt = null;
      console.log('PWA가 성공적으로 설치되었습니다.');
    });
  </script>
</body>
</html>
